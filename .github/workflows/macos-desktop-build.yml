name: macOS Desktop Build

on:
  workflow_dispatch:
    inputs:
      allow_unsigned_artifact:
        description: "Allow unsigned, non-notarized macOS artifacts for internal testing only."
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - ".github/workflows/macos-desktop-build.yml"
      - "analysis_options.yaml"
      - "assets/**"
      - "lib/**"
      - "macos/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "scripts/build_macos_release.sh"
      - "scripts/notarize_macos_app.sh"
      - "scripts/package_macos_release.sh"
      - "scripts/sign_macos_app.sh"
      - "test/**"

jobs:
  build:
    name: Build NAVDREAM macOS (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: arm64
            runner: macos-15
          - architecture: x64
            runner: macos-15-intel

    env:
      APP_NAME: NAVDREAM
      ALLOW_UNSIGNED_MACOS_ARTIFACT: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_unsigned_artifact == true }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" || -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "MACOS_SIGNING_CONFIGURED=false" >> "$GITHUB_ENV"
            echo "No Developer ID certificate secrets were provided."
            exit 0
          fi

          keychain_path="$RUNNER_TEMP/navdream-signing.keychain-db"
          keychain_password="${MACOS_KEYCHAIN_PASSWORD:-$(uuidgen)}"
          certificate_path="$RUNNER_TEMP/navdream-developer-id.p12"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path" 2>/dev/null \
            || printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          identity="${MACOS_CODESIGN_IDENTITY:-}"
          if [[ -z "$identity" ]]; then
            identity="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
          fi

          if [[ -z "$identity" ]]; then
            echo "::error::No Developer ID Application signing identity was found in the imported certificate."
            exit 1
          fi

          echo "MACOS_SIGNING_CONFIGURED=true" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "MACOS_BUILD_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Sign macOS app
        run: |
          if [[ "${MACOS_SIGNING_CONFIGURED:-false}" != "true" ]]; then
            if [[ "${ALLOW_UNSIGNED_MACOS_ARTIFACT:-false}" == "true" ]]; then
              echo "::warning::Skipping Developer ID signing because allow_unsigned_artifact=true. This artifact will trigger macOS Gatekeeper."
              exit 0
            fi

            echo "::error::Mac downloads must be Developer ID signed and notarized to open normally after download. Configure the macOS signing secrets or rerun workflow_dispatch with allow_unsigned_artifact=true for internal testing only."
            exit 1
          fi

          ./scripts/sign_macos_app.sh

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          if [[ "${MACOS_SIGNING_CONFIGURED:-false}" != "true" ]]; then
            if [[ "${ALLOW_UNSIGNED_MACOS_ARTIFACT:-false}" == "true" ]]; then
              echo "::warning::Skipping notarization because allow_unsigned_artifact=true. This artifact will trigger macOS Gatekeeper."
              exit 0
            fi

            echo "::error::Cannot notarize without a signed app."
            exit 1
          fi

          has_api_key=false
          has_apple_id=false

          [[ -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER_ID:-}" && -n "${APPLE_API_KEY_P8_BASE64:-}" ]] && has_api_key=true
          [[ -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]] && has_apple_id=true

          if [[ "$has_api_key" != "true" && "$has_apple_id" != "true" ]]; then
            if [[ "${ALLOW_UNSIGNED_MACOS_ARTIFACT:-false}" == "true" ]]; then
              echo "::warning::Skipping notarization because no Apple notarization credentials were provided. This artifact will trigger macOS Gatekeeper."
              exit 0
            fi

            echo "::error::Mac downloads must be notarized to open normally after download. Configure Apple notarization secrets or rerun workflow_dispatch with allow_unsigned_artifact=true for internal testing only."
            exit 1
          fi

          ./scripts/notarize_macos_app.sh

      - name: Package macOS app
        run: ./scripts/package_macos_release.sh "${{ matrix.architecture }}"

      # Remove previous artifacts with this architecture's name so only the
      # latest build is retained. Scoped per-architecture so the parallel
      # matrix jobs don't delete each other's uploads.
      - name: Prune previous artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          name="NAVDREAM-macos-${{ matrix.architecture }}-release"
          for id in $(gh api "repos/${{ github.repository }}/actions/artifacts" --paginate --jq ".artifacts[] | select(.name==\"$name\") | .id"); do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" && echo "Deleted old artifact $id"
          done

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: NAVDREAM-macos-${{ matrix.architecture }}-release
          path: |
            dist/macos/${{ matrix.architecture }}/NAVDREAM-macos-${{ matrix.architecture }}-release.zip
            dist/macos/${{ matrix.architecture }}/NAVDREAM-macos-${{ matrix.architecture }}-release.zip.sha256
          if-no-files-found: error
          retention-days: 5

      - name: Delete signing keychain
        if: ${{ always() }}
        run: |
          if [[ -n "${MACOS_BUILD_KEYCHAIN:-}" && -f "${MACOS_BUILD_KEYCHAIN:-}" ]]; then
            security delete-keychain "$MACOS_BUILD_KEYCHAIN" || true
          fi
