name: Windows Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-desktop-build.yml"
      - "assets/**"
      - "lib/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "scripts/build_windows_release.ps1"
      - "scripts/package_windows_release.ps1"
      - "windows/**"

jobs:
  build:
    name: Build NAVDREAM Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: flutter test

      - name: Build Windows release
        shell: pwsh
        env:
          # Non-sensitive Supabase client config. Set these under
          # Settings > Secrets and variables > Actions > Variables to target a
          # specific project. Only the public publishable (anon) key belongs
          # here, never a service-role key or payment secret.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          # Inject Supabase config via --dart-define when repo variables are
          # set. When unset, the app uses the publishable config baked into
          # lib/app/constants/supabase_config.dart, so downloaded builds always
          # connect to Supabase (behavior unchanged from before).
          $flutterArgs = @("build", "windows", "--release")
          if (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_URL)) {
            $flutterArgs += "--dart-define=SUPABASE_URL=$($env:SUPABASE_URL)"
            Write-Host "SUPABASE_URL: provided via repository variable."
          } else {
            Write-Host "SUPABASE_URL: using baked-in fallback from supabase_config.dart."
          }
          if (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_PUBLISHABLE_KEY)) {
            $flutterArgs += "--dart-define=SUPABASE_PUBLISHABLE_KEY=$($env:SUPABASE_PUBLISHABLE_KEY)"
            Write-Host "SUPABASE_PUBLISHABLE_KEY: provided via repository variable."
          } else {
            Write-Host "SUPABASE_PUBLISHABLE_KEY: using baked-in fallback from supabase_config.dart."
          }
          flutter @flutterArgs

      - name: Package Windows release ZIP
        id: package
        shell: pwsh
        run: ./scripts/package_windows_release.ps1

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_base }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
          if-no-files-found: error
