name: macOS Desktop Release

# Manually triggered or push-driven workflow that builds, signs, notarizes,
# packages, and publishes the macOS universal (arm64 + x86_64) desktop app to a
# GitHub Release and the shared Supabase update manifest read by the in-app
# updater. Mirrors the Windows Desktop Release workflow.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.0.1 (leave blank to use pubspec.yaml)."
        required: false
        type: string
        default: ""
      notes:
        description: "Release notes shown in the in-app update prompt."
        required: false
        type: string
        default: ""
      mandatory:
        description: "Force users to update (blocking prompt)."
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub Release as a pre-release."
        required: false
        type: boolean
        default: false
      allow_unsigned_artifact:
        description: "Allow unsigned, non-notarized macOS artifacts for internal testing only (NOT published to the update feed)."
        required: false
        type: boolean
        default: false
  # Auto-publish a macOS release on every push to main that touches app code or
  # the version. The in-app updater only shows an update when the pubspec
  # marketing version is higher than what a client already runs, so pushes
  # without a version bump simply re-publish the same version (no-op for users).
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "macos/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "scripts/build_macos_release.sh"
      - "scripts/notarize_macos_app.sh"
      - "scripts/package_macos_release.sh"
      - "scripts/sign_macos_app.sh"
      - "scripts/publish_supabase_release.sh"
      - ".github/workflows/macos-desktop-release.yml"

# macOS uses its OWN concurrency group, deliberately NOT the shared
# "release-manifest-publish" group used by the Android and Windows workflows.
#
# GitHub only keeps one running + one pending run per concurrency group; a third
# run queued in the same group is cancelled. Android and Windows both trigger on
# a push to main and share their group (one runs, one queues — both complete).
# Adding macOS to that same group would make three runs compete for two slots,
# so one would always be cancelled. A separate group keeps macOS fully
# independent and leaves the proven Android/Windows behavior untouched.
#
# The manifest is a read-modify-write on a shared file, but the three platforms
# finish minutes apart (Android ~10m, Windows ~13m, macOS ~20m+ with
# notarization), so their brief (~2s) manifest writes do not collide in practice.
concurrency:
  group: release-manifest-publish-macos
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release NAVDREAM macOS (universal)
    runs-on: macos-15

    env:
      APP_NAME: NAVDREAM
      ALLOW_UNSIGNED_MACOS_ARTIFACT: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_unsigned_artifact == true }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: flutter test

      - name: Resolve version and build number
        id: ver
        run: |
          set -euo pipefail
          pubspec_line="$(grep -E '^version:' pubspec.yaml | head -n1 | sed 's/version:[[:space:]]*//')"
          pubspec_version="${pubspec_line%%+*}"
          pubspec_build="${pubspec_line##*+}"
          if [[ "$pubspec_build" == "$pubspec_line" ]]; then pubspec_build=""; fi

          input_version="${{ inputs.version }}"
          if [[ -n "$input_version" ]]; then
            version="$input_version"
          else
            version="$pubspec_version"
          fi
          version="${version#v}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$pubspec_build" >> "$GITHUB_OUTPUT"
          echo "artifact=LedgerPro-macOS-v$version.zip" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$version build=$pubspec_build"

      - name: Build macOS release (universal)
        env:
          # Non-sensitive Supabase client config. Set these under
          # Settings > Secrets and variables > Actions > Variables to target a
          # specific project. Only the public publishable (anon) key belongs
          # here, never a service-role key or payment secret.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          # Flutter macOS release builds are universal (arm64 + x86_64) by
          # default, so a single build runs on both Apple Silicon and Intel.
          args=(build macos --release "--build-name=${{ steps.ver.outputs.version }}")
          if [[ -n "${{ steps.ver.outputs.build }}" ]]; then
            args+=("--build-number=${{ steps.ver.outputs.build }}")
          fi
          if [[ -n "${SUPABASE_URL:-}" ]]; then
            args+=("--dart-define=SUPABASE_URL=${SUPABASE_URL}")
            echo "SUPABASE_URL: provided via repository variable."
          else
            echo "SUPABASE_URL: using baked-in fallback from supabase_config.dart."
          fi
          if [[ -n "${SUPABASE_PUBLISHABLE_KEY:-}" ]]; then
            args+=("--dart-define=SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}")
            echo "SUPABASE_PUBLISHABLE_KEY: provided via repository variable."
          else
            echo "SUPABASE_PUBLISHABLE_KEY: using baked-in fallback from supabase_config.dart."
          fi
          flutter "${args[@]}"

      - name: Import Developer ID certificate
        id: cert
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" || -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "MACOS_SIGNING_CONFIGURED=false" >> "$GITHUB_ENV"
            echo "No Developer ID certificate secrets were provided."
            exit 0
          fi

          keychain_path="$RUNNER_TEMP/navdream-signing.keychain-db"
          keychain_password="${MACOS_KEYCHAIN_PASSWORD:-$(uuidgen)}"
          certificate_path="$RUNNER_TEMP/navdream-developer-id.p12"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path" 2>/dev/null \
            || printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          identity="${MACOS_CODESIGN_IDENTITY:-}"
          if [[ -z "$identity" ]]; then
            identity="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
          fi

          if [[ -z "$identity" ]]; then
            echo "::error::No Developer ID Application signing identity was found in the imported certificate."
            exit 1
          fi

          echo "MACOS_SIGNING_CONFIGURED=true" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "MACOS_BUILD_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Sign macOS app
        run: |
          if [[ "${MACOS_SIGNING_CONFIGURED:-false}" != "true" ]]; then
            if [[ "${ALLOW_UNSIGNED_MACOS_ARTIFACT:-false}" == "true" ]]; then
              echo "::warning::Skipping Developer ID signing because allow_unsigned_artifact=true. This artifact will trigger macOS Gatekeeper and will NOT be published to the update feed."
              exit 0
            fi
            echo "::error::Mac downloads must be Developer ID signed and notarized to open normally after download. Configure the macOS signing secrets or rerun workflow_dispatch with allow_unsigned_artifact=true for internal testing only."
            exit 1
          fi

          ./scripts/sign_macos_app.sh

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          if [[ "${MACOS_SIGNING_CONFIGURED:-false}" != "true" ]]; then
            if [[ "${ALLOW_UNSIGNED_MACOS_ARTIFACT:-false}" == "true" ]]; then
              echo "::warning::Skipping notarization because allow_unsigned_artifact=true."
              exit 0
            fi
            echo "::error::Cannot notarize without a signed app."
            exit 1
          fi

          has_api_key=false
          has_apple_id=false
          [[ -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER_ID:-}" && -n "${APPLE_API_KEY_P8_BASE64:-}" ]] && has_api_key=true
          [[ -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]] && has_apple_id=true

          if [[ "$has_api_key" != "true" && "$has_apple_id" != "true" ]]; then
            if [[ "${ALLOW_UNSIGNED_MACOS_ARTIFACT:-false}" == "true" ]]; then
              echo "::warning::Skipping notarization because no Apple notarization credentials were provided."
              exit 0
            fi
            echo "::error::Mac downloads must be notarized to open normally after download. Configure Apple notarization secrets or rerun workflow_dispatch with allow_unsigned_artifact=true for internal testing only."
            exit 1
          fi

          ./scripts/notarize_macos_app.sh

      - name: Package macOS app (universal)
        id: package
        run: |
          set -euo pipefail
          ./scripts/package_macos_release.sh universal

          produced="dist/macos/universal/${APP_NAME}-macos-universal-release.zip"
          if [[ ! -f "$produced" ]]; then
            echo "::error::Expected packaged artifact not found at $produced"; exit 1
          fi

          # Stage a versioned copy that matches the Android/Windows naming so the
          # GitHub Release asset and manifest fileName are consistent.
          dest="dist/macos/universal/${{ steps.ver.outputs.artifact }}"
          cp "$produced" "$dest"
          ( cd dist/macos/universal && shasum -a 256 "${{ steps.ver.outputs.artifact }}" > "${{ steps.ver.outputs.artifact }}.sha256" )
          echo "zip_path=$dest" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$dest.sha256" >> "$GITHUB_OUTPUT"

      # A code-signed + notarized artifact is required for a Mac download to open
      # normally. Only publish to the update feed when signing succeeded, mirroring
      # the Android workflow's "skip publish when unsigned" behavior.
      - name: Publish GitHub Release (macOS asset)
        id: ghrelease
        if: ${{ env.MACOS_SIGNING_CONFIGURED == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          artifact="${{ steps.ver.outputs.artifact }}"
          zip="${{ steps.package.outputs.zip_path }}"
          checksum="${{ steps.package.outputs.checksum_path }}"
          prerelease="${{ inputs.prerelease }}"

          tag="v$version"
          title="LedgerPro macOS v$version"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; uploading assets with --clobber."
            gh release upload "$tag" "$zip" "$checksum" --clobber
          elif [[ "$prerelease" == "true" ]]; then
            gh release create "$tag" "$zip" "$checksum" --title "$title" \
              --notes "${{ inputs.notes || format('LedgerPro macOS v{0}', steps.ver.outputs.version) }}" \
              --target "$GITHUB_SHA" --prerelease
          else
            gh release create "$tag" "$zip" "$checksum" --title "$title" \
              --notes "${{ inputs.notes || format('LedgerPro macOS v{0}', steps.ver.outputs.version) }}" \
              --target "$GITHUB_SHA"
          fi

          url="https://github.com/${{ github.repository }}/releases/download/$tag/$artifact"
          echo "asset_url=$url" >> "$GITHUB_OUTPUT"
          echo "Release asset URL: $url"

      # Point the shared update manifest at the public GitHub Release asset. The
      # repository is public, so the asset URL is reachable by clients without
      # auth, and this avoids the Supabase Storage upload size limit for the
      # larger universal macOS bundle. Only the manifest is updated (--url).
      - name: Publish to Supabase + update manifest
        if: ${{ env.MACOS_SIGNING_CONFIGURED == 'true' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://besmkildldztpiowpiit.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set; cannot publish the update."
            exit 1
          fi
          notes="${{ inputs.notes }}"
          if [[ -z "$notes" ]]; then notes="LedgerPro macOS v${{ steps.ver.outputs.version }}"; fi
          ./scripts/publish_supabase_release.sh \
            --platform macos \
            --version "${{ steps.ver.outputs.version }}" \
            --build "${{ steps.ver.outputs.build }}" \
            --file "${{ steps.package.outputs.zip_path }}" \
            --artifact-name "${{ steps.ver.outputs.artifact }}" \
            --url "${{ steps.ghrelease.outputs.asset_url }}" \
            --notes "$notes" \
            --mandatory "${{ inputs.mandatory && 'true' || 'false' }}"

      - name: Skip publish (unsigned)
        if: ${{ env.MACOS_SIGNING_CONFIGURED != 'true' }}
        run: |
          echo "::warning::Built an unsigned/non-notarized macOS app, so it was NOT published to the update feed. Configure the macOS signing + notarization secrets to enable auto-update releases."

      - name: Delete signing keychain
        if: ${{ always() }}
        run: |
          if [[ -n "${MACOS_BUILD_KEYCHAIN:-}" && -f "${MACOS_BUILD_KEYCHAIN:-}" ]]; then
            security delete-keychain "$MACOS_BUILD_KEYCHAIN" || true
          fi
