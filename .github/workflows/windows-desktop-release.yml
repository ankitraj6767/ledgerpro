name: Windows Desktop Release

# Manually triggered workflow that builds, packages, and publishes the Windows
# x64 desktop app (ZIP + SHA-256 checksum) to GitHub Releases.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.0.1 (leave blank to use pubspec.yaml)."
        required: false
        type: string
        default: ""
      notes:
        description: "Release notes shown in the in-app update prompt."
        required: false
        type: string
        default: ""
      mandatory:
        description: "Force users to update (blocking prompt)."
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub Release as a pre-release."
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release NAVDREAM Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib test

      - name: Test
        run: flutter test

      - name: Build Windows release
        shell: pwsh
        env:
          # Non-sensitive Supabase client config. Set these under
          # Settings > Secrets and variables > Actions > Variables to target a
          # specific project. Only the public publishable (anon) key belongs
          # here, never a service-role key or payment secret.
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          # Inject Supabase config via --dart-define when repo variables are
          # set. When unset, the app uses the publishable config baked into
          # lib/app/constants/supabase_config.dart, so released builds always
          # connect to Supabase (behavior unchanged from before).
          $flutterArgs = @("build", "windows", "--release")
          if (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_URL)) {
            $flutterArgs += "--dart-define=SUPABASE_URL=$($env:SUPABASE_URL)"
            Write-Host "SUPABASE_URL: provided via repository variable."
          } else {
            Write-Host "SUPABASE_URL: using baked-in fallback from supabase_config.dart."
          }
          if (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_PUBLISHABLE_KEY)) {
            $flutterArgs += "--dart-define=SUPABASE_PUBLISHABLE_KEY=$($env:SUPABASE_PUBLISHABLE_KEY)"
            Write-Host "SUPABASE_PUBLISHABLE_KEY: provided via repository variable."
          } else {
            Write-Host "SUPABASE_PUBLISHABLE_KEY: using baked-in fallback from supabase_config.dart."
          }
          flutter @flutterArgs

      - name: Package Windows release ZIP
        id: package
        shell: pwsh
        run: ./scripts/package_windows_release.ps1 -Version "${{ inputs.version }}"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.package.outputs.version }}"
          $artifactName = "${{ steps.package.outputs.artifact_name }}"
          $artifactBase = "${{ steps.package.outputs.artifact_base }}"
          $checksumName = "${{ steps.package.outputs.checksum_name }}"
          $exeName = "${{ steps.package.outputs.exe_name }}"
          $zip = "${{ steps.package.outputs.zip_path }}"
          $checksum = "${{ steps.package.outputs.checksum_path }}"
          $prerelease = "${{ inputs.prerelease }}"

          $tag = "v$version"
          $title = "LedgerPro Windows v$version"

          # Build notes from an array (no literal backticks / no here-string
          # terminator indentation pitfalls).
          $notes = @(
            "LedgerPro / NAVDREAM Windows x64 desktop build.",
            "",
            "Version: $version",
            "",
            "Install:",
            "1. Download $artifactName.",
            "2. Extract the ZIP (right-click then Extract All).",
            "3. Open the $artifactBase folder and run $exeName.",
            "",
            "Keep $exeName together with the data folder and the .dll files in the same directory.",
            "",
            "Verify (optional): the SHA-256 of $artifactName must match the value in $checksumName."
          ) -join "`n"

          # Reuse the release if the tag already exists; otherwise create it.
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists; uploading assets with --clobber."
            gh release upload $tag $zip $checksum --clobber
          } elseif ($prerelease -eq "true") {
            gh release create $tag $zip $checksum --title $title --notes $notes --target $env:GITHUB_SHA --prerelease
          } else {
            gh release create $tag $zip $checksum --title $title --notes $notes --target $env:GITHUB_SHA
          }

      # Publishes the ZIP to the public Supabase bucket and updates the shared
      # update manifest. This is what the in-app updater reads (the GitHub
      # Release above is private and not reachable by clients).
      - name: Publish to Supabase + update manifest
        shell: pwsh
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://besmkildldztpiowpiit.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SUPABASE_SERVICE_ROLE_KEY)) {
            Write-Error "SUPABASE_SERVICE_ROLE_KEY secret is not set; cannot publish the update."
            exit 1
          }

          $version = "${{ steps.package.outputs.version }}"
          $zip = "${{ steps.package.outputs.zip_path }}"
          $artifactName = "${{ steps.package.outputs.artifact_name }}"

          # Build number from pubspec (after the '+'), used as a version tie-breaker.
          $build = ""
          foreach ($line in Get-Content pubspec.yaml) {
            if ($line -match '^\s*version:\s*(.+?)\s*$') {
              if ($Matches[1] -match '\+(\d+)') { $build = $Matches[1] }
              break
            }
          }

          $notes = "${{ inputs.notes }}"
          if ([string]::IsNullOrWhiteSpace($notes)) { $notes = "LedgerPro Windows v$version" }
          $mandatory = ("${{ inputs.mandatory }}" -eq "true")

          ./scripts/publish_supabase_release.ps1 `
            -Platform windows `
            -Version $version `
            -Build $build `
            -File $zip `
            -ArtifactName $artifactName `
            -Notes $notes `
            -Mandatory $mandatory
